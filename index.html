<!DOCTYPE html>
<html lang="es">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- se ambio para poder ajustar a la pantalla dependiendo de si es compu o movil -->
<title>Intensamente Pao</title>

<link rel="stylesheet" href="canvas.css">

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="juego"></div>

<script src="main.js"></script>
<!--Service Worker:
Se cambió la ruta de "js/service-worker.js" a "service-worker.js"
porque el archivo no estaba dentro de la carpeta "js",(se paso a github)
sino en la raíz del proyecto.

La ruta anterior daba error 404 (archivo no encontrado).
Ahora apunta correctamente al archivo real.

Función:
Permite que el juego se guarde en caché,
cargue más rápido,
pueda funcionar sin internet (modo offline)
y pueda instalarse como app en el celular. -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker registrado"))
    .catch(error => console.log("Error:", error));
}
</script>

</body>

</html>
